<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <title>Контур</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-mark">К</div>
      <div>
        <h1>Контур</h1>
        <span>Система мониторинга ИТ‑инфраструктуры</span>
      </div>
    </div>
    <nav>
      <a href="/">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></svg>
        Главная
      </a>
      <a href="/objects">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16a1 1 0 0 1 1 1v5H3V5a1 1 0 0 1 1-1Zm-1 9h18v6a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/></svg>
        Объекты
      </a>
      <a href="/incidents">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 3h2v9h-2zm0 11h2v2h-2z"/></svg>
        Инциденты
      </a>
      <a href="/reports">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 2h9l5 5v15a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1Zm8 1v5h5"/></svg>
        Отчёты
      </a>
    </nav>
    <button id="themeToggle" class="theme-toggle" type="button">Тема: светлая</button>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>

  <script>
    const root = document.documentElement;
    const toggle = document.getElementById('themeToggle');

    function setTheme(theme) {
      root.setAttribute('data-theme', theme);
      toggle.textContent = theme === 'dark' ? 'Тема: тёмная' : 'Тема: светлая';
      localStorage.setItem('theme', theme);
    }

    const savedTheme = localStorage.getItem('theme') || 'light';
    setTheme(savedTheme);

    toggle.addEventListener('click', () => {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      setTheme(next);
    });
  </script>
</body>
</html>
