{% extends "base.html" %}
{% block content %}
<h2 class="mb-3">Notifications</h2>
<form class="row g-2 mb-3" method="get">
  <div class="col-md-4">
    <select class="form-select" name="object_id">
      <option value="">All objects</option>
      {% for obj in objects %}
      <option value="{{ obj.id }}" {% if selected_object_id == obj.id %}selected{% endif %}>{{ obj.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-2"><button class="btn btn-primary w-100" type="submit">Filter</button></div>
</form>
<table class="table table-sm table-striped">
  <thead><tr><th>ID</th><th>Incident</th><th>Channel</th><th>Status</th><th>Text</th><th>Sent</th></tr></thead>
  <tbody>
    {% for n in notifications %}
    <tr>
      <td>{{ n.id }}</td><td>{{ n.incident_id }}</td><td>{{ n.channel }}</td><td>{{ n.delivery_status }}</td><td>{{ n.message_text }}</td><td>{{ n.sent_at }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
