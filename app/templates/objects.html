{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>Объекты мониторинга</h2>
  <form method="post" class="form">
    <input type="text" name="name" placeholder="Название" required />
    <input type="text" name="object_type" value="http" />
    <input type="url" name="address" placeholder="https://example.com" required />
    <input type="number" name="check_interval" value="{{ settings.default_check_interval }}" />
    <input type="number" name="warning_threshold" value="{{ settings.warning_response_time }}" />
    <input type="number" name="critical_threshold" value="{{ settings.critical_response_time }}" />
    <button type="submit">Добавить</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Название</th>
        <th>Тип</th>
        <th>Адрес</th>
        <th>Статус</th>
        <th>Последняя проверка</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody>
      {% for obj in objects %}
      <tr>
        <td>{{ obj.id }}</td>
        <td>{{ obj.name }}</td>
        <td>{{ obj.object_type }}</td>
        <td>{{ obj.address }}</td>
        <td class="status {{ obj.status }}">{{ obj.status }}</td>
        <td>{{ obj.last_checked or "-" }}</td>
        <td>
          <form method="post" action="/objects/{{ obj.id }}/delete">
            <button type="submit" class="danger">Удалить</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
