<table class="table table-striped table-sm">
  <thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Address</th><th>Status</th><th>Actions</th></tr></thead>
  <tbody>
    {% for obj in objects %}
    <tr>
      <td>{{ obj.id }}</td>
      <td>{{ obj.name }}</td>
      <td>{{ obj.object_type }}</td>
      <td>{{ obj.address }}</td>
      <td class="status-{{ obj.status }}">{{ obj.status }}</td>
      <td x-data="{}">
        <button class="btn btn-sm btn-danger"
                hx-delete="/api/objects/{{ obj.id }}"
                hx-confirm="Delete object?"
                hx-target="#objects-table"
                hx-get="/objects/table"
                hx-swap="innerHTML">Delete</button>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
